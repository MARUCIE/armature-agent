name: CI - Tests + Gate Integrity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build + Vitest (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: TypeScript build
        run: npm run build

      - name: Run test suite
        run: npm test

  gate-integrity:
    name: Matrix / Security / Performance / Eval Gates
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify matrix entrypoints
        run: npm run test:matrix:sync

      - name: Static gate
        run: npm run test:static

      - name: Security gate
        run: npm run test:security

      - name: Performance gate
        run: npm run test:performance

      - name: Fast agent-eval gate
        run: npm run test:ai-eval-fast
